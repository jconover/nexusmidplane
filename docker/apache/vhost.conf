<VirtualHost *:80>
    ServerName localhost

    ProxyPreserveHost On

    # Route /java/ to WildFly Java EE app server
    ProxyPass /java/ http://wildfly:8080/java-app/
    ProxyPassReverse /java/ http://wildfly:8080/java-app/

    # Route /dotnet/ to .NET app (simulates IIS in real on-prem)
    ProxyPass /dotnet/ http://dotnet-app:5000/
    ProxyPassReverse /dotnet/ http://dotnet-app:5000/

    # Default landing page
    DocumentRoot /var/www/html

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
