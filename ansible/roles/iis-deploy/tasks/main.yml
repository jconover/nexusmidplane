---
- name: Create application directory
  ansible.windows.win_file:
    path: "{{ app_dest_path }}"
    state: directory

- name: Copy published .NET application
  ansible.windows.win_copy:
    src: "{{ app_source_path }}"
    dest: "{{ app_dest_path }}"

- name: Create IIS application pool
  microsoft.iis.web_app_pool:
    name: "{{ iis_app_pool_name }}"
    state: started
    attributes:
      managedRuntimeVersion: ""
      startMode: AlwaysRunning

- name: Create IIS website
  microsoft.iis.website:
    name: "{{ iis_site_name }}"
    state: started
    port: 80
    ip: "*"
    hostname: ""
    physical_path: "{{ app_dest_path }}"
    application_pool: "{{ iis_app_pool_name }}"

- name: Add HTTPS binding to IIS site
  microsoft.iis.website:
    name: "{{ iis_site_name }}"
    bindings:
      - protocol: https
        port: 443
        ip: "*"
        certificate_hash: "{{ ssl_cert_thumbprint }}"
        certificate_store_name: MY
    state: started
  when: ssl_cert_thumbprint | length > 0
