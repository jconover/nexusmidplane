[apache_proxy]
apache-proxy ansible_host=172.20.0.10 ansible_connection=docker ansible_user=root

[wildfly_servers]
wildfly-onprem ansible_host=172.20.0.11 ansible_connection=docker ansible_user=root

[iis_servers]
iis-onprem ansible_host=172.20.0.12 ansible_connection=winrm ansible_user=Administrator ansible_password="{{ vault_iis_password }}" ansible_winrm_transport=ntlm ansible_winrm_server_cert_validation=ignore ansible_port=5985

[onprem:children]
apache_proxy
wildfly_servers
iis_servers

[onprem:vars]
ansible_python_interpreter=/usr/bin/python3
